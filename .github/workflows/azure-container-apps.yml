# 使用.NET 8 来部署 Azure Container Apps，以确保兼容性和稳定性。
# 原生 .NET 部署 (Oryx)，不使用 DOCKER
# 变量全部手动配置在ACA中，不再通过GitHub Secrets传递

name: Deploy to Azure Container Apps

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

# 核心：必须配置 id-token 写入权限，否则 OIDC 无法交换 Token
permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 修正后的 Azure 登录：使用 OIDC
      # 需要在 GitHub Secrets 中预先配置这三个 ID
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # 部署到 Container App
      # 自动识别 .NET 8 项目并使用 Oryx 进行原生构建
      - name: Build and deploy Container App
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          registryUrl: saaswebreg001-cjd0cucyfdh7bcbk.azurecr.io
          registryUsername: ${{ secrets.REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.REGISTRY_PASSWORD }}
          containerAppName: saas-web-app3
          resourceGroup: saas-infra-group
          # .NET 8 容器默认监听 8080，务必保持一致
          targetPort: 8080 
          ingress: external
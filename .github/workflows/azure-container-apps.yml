name: Deploy .NET 8 to Azure Container Apps

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: Development          # 讀取 Environment secrets

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build project
        run: dotnet build --configuration Release --no-restore

      - name: Publish project
        run: dotnet publish --configuration Release --output ./publish --no-restore

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy source code (Oryx build)
        uses: azure/container-apps-deploy@v1
        with:
          appName: saas-web-app3
          resourceGroup: saas-infra-group
          source: ./publish
          targetPort: 8080
          ingress: external
          # ← 這裡不再放 environmentVariables（多行會壞）

      - name: Update environment variables（含多行 RSA PEM 金鑰）
        run: |
          az containerapp update \
            --name saas-web-app3 \
            --resource-group saas-infra-group \
            --set-env-vars \
              "RSA_PRIVATE_KEY_CONTENT=${{ secrets.RSA_PRIVATE_KEY_CONTENT }}" \
              "RSA_PUBLIC_KEY_CONTENT=${{ secrets.RSA_PUBLIC_KEY_CONTENT }}" \
              "CONNECTIONSTRINGS__DefaultConnection=${{ secrets.CONNECTIONSTRINGS__DefaultConnection }}" \
              "STRIPE_PUBLISHABLEKEY=${{ secrets.STRIPE_PUBLISHABLEKEY }}" \
              "STRIPE_SECRETKEY=${{ secrets.STRIPE_SECRETKEY }}"
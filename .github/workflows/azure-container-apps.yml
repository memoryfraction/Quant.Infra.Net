# 使用.NET 8 来部署 Azure Container Apps，以确保兼容性和稳定性。
# 原生 .NET 部署 (Oryx)，不使用 DOCKER
# 变量全部手动配置在ACA中，不再通过GitHub Secrets传递

name: Deploy .NET 8 to Azure Container Apps

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. 登录 Azure (使用 Service Principal)
      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: '{"clientId":"${{ secrets.SAASWEBAPP3_AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.SAASWEBAPP_AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.SAASWEBAPP3_AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.SAASWEBAPP3_AZURE_TENANT_ID }}"}'

      # 2. 安装 Azure CLI (GitHub Runner 自带，但显式调用更稳妥)
      - name: Install Azure CLI
        run: |
          curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash

      # 3. 部署到 ACA (核心步骤：使用 --source 触发 Oryx 原生构建)
      - name: Deploy to Azure Container Apps
        run: |
          az containerapp up \
            --name ${{ secrets.ACA_APP_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --source . \
            --target-port 8080 \
            --ingress external \
            --environment ${{ secrets.ACA_ENV_NAME }} \
            --registry-server ${{ secrets.ACR_LOGIN_SERVER }} \
            --query properties.configuration.ingress.fqdn \
            --output table
            
        env:
          # 如果需要在 ACA 中设置环境变量，可以在这里追加 --env-vars 参数
          # 例如: --env-vars "KEY=value"
          # 既然你说变量手动配置在 ACA 中，这里就不需要传 env-vars，ACA 会保留原有配置或应用默认值
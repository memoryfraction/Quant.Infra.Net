# 使用.NET 8 来部署 Azure Container Apps，以确保兼容性和稳定性。
# 原生 .NET 部署 (Oryx)，不使用 DOCKER
# 变量全部手动配置在ACA中，不再通过GitHub Secrets传递

# 使用 .NET 8 部署 Azure Container Apps
# 采用服务主权凭证 (Service Principal JSON) 认证
# 原生 .NET 部署 (Oryx)，不使用 Dockerfile

name: Deploy to Azure Container Apps

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 使用你刚配置的 JSON Secret 进行登录
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 部署到 Container App
      # 该 Action 会自动通过 Oryx 引擎构建 .NET 8 项目并推送镜像
      - name: Build and deploy Container App
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          registryUrl: saaswebreg001-cjd0cucyfdh7bcbk.azurecr.io
          registryUsername: ${{ secrets.REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.REGISTRY_PASSWORD }}
          containerAppName: saas-web-app3
          resourceGroup: saas-infra-group
          # .NET 8 默认监听 8080 端口
          targetPort: 8080 
          ingress: external
# 使用 .NET 8 部署 Azure Container Apps
# 采用服务主权凭证 (Service Principal JSON) 认证
# 原生 .NET 部署 (Oryx)，不使用 Dockerfile

name: Deploy to Azure Container Apps

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 使用你刚配置的 JSON Secret 进行登录
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 部署到 Container App
      - name: Build and deploy Container App
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          registryUrl: saaswebreg001-cjd0cucyfdh7bcbk.azurecr.io
          registryUsername: ${{ secrets.REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.REGISTRY_PASSWORD }}
          containerAppName: saas-web-app3
          resourceGroup: saas-infra-group
          targetPort: 8080 
          ingress: external
          # 关键新增：将代码需要的变量名映射到已经在 ACA 配置好的 Secret 名称上
          environmentVariables: |
            rsa-private-key-content=secretref:rsa-private-key-content
            rsa-public-key-content=secretref:rsa-public-key-content
            ConnectionStrings__DefaultConnection=secretref:connectionstrings-defaultconnection
            Stripe__SecretKey=secretref:stripe-secret-key
            Stripe__WebhookSecret=secretref:stripe-webhook-secret
            Stripe__PublishableKey=secretref:stripe-publishable-key
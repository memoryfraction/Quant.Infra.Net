# 使用.NET 8 来部署 Azure Container Apps，以确保兼容性和稳定性。
# 原生 .NET 部署 (Oryx)，不使用 DOCKER
# 变量全部手动配置在ACA中，不再通过GitHub Secrets传递

name: Deploy .NET 8 to Azure Container Apps
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: Development
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore src/Saas.Infra.Net.sln

      - name: Build project
        run: dotnet build src/Saas.Infra.Net.sln --configuration Release
        # 移除 --no-restore，自动补全测试项目还原

      - name: Publish project
        run: dotnet publish src/Saas.Infra.Net.sln --configuration Release --output ./publish

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to ACA
        uses: azure/container-apps-deploy-action@v1
        with:
          appName: saas-web-app3
          resourceGroup: saas-infra-group
          source: ./publish
          targetPort: 8080
          ingress: external
          environmentVariables: |
            ASPNETCORE_ENVIRONMENT=Production
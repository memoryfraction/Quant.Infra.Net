# 使用.NET 8 来部署 Azure Container Apps，以确保兼容性和稳定性。
# 原生 .NET 部署 (Oryx)，不使用 DOCKER
# 变量全部手动配置在ACA中，不再通过GitHub Secrets传递

name: Deploy to Azure Container Apps

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 核心修复：用v2版本 + 完整的服务主体参数（包含clientSecret）
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.SAASWEBAPP3_AZURE_CLIENT_ID }}
          client-secret: ${{ secrets.SAASWEBAPP_AZURE_CLIENT_SECRET }}  # 必须加这个！
          tenant-id: ${{ secrets.SAASWEBAPP3_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.SAASWEBAPP3_AZURE_SUBSCRIPTION_ID }}

      # 部署命令（保留你原来的逻辑）
      - name: Deploy to Container Apps
        run: |
          az containerapp up \
            --name "${{ secrets.ACA_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --source "." \
            --target-port 8080 \
            --ingress external \
            --environment "${{ secrets.ACA_ENV_NAME }}" \
            --registry-server "${{ secrets.ACR_LOGIN_SERVER }}"
        shell: bash
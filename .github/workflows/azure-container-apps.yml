# 使用.NET 8 来部署 Azure Container Apps，以确保兼容性和稳定性。
# 原生 .NET 部署 (Oryx)，不使用 DOCKER
# 变量全部手动配置在ACA中，不再通过GitHub Secrets传递

name: Deploy to Azure Container Apps

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # 保留手动触发部署的能力，方便测试

# OIDC认证必须的权限配置（之前漏掉了，会导致CLI登录失败）
permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # CLI登录（极简版，适配ACA部署）
      - name: Azure Login
        uses: azure/login@v2
        with:
          auth-type: cli

      # 部署Container App（补全端口/网络配置，适配.NET 8默认端口）
      - name: Build and push container image
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          registryUrl: saaswebreg001-cjd0cucyfdh7bcbk.azurecr.io
          registryUsername: ${{ secrets.REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.REGISTRY_PASSWORD }}
          containerAppName: saas-web-app3
          resourceGroup: saas-infra-group
          targetPort: 8080  # .NET 8默认监听8080端口，必须指定
          ingress: external  # 允许外部访问，否则部署后打不开应用
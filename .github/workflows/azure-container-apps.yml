name: Deploy .NET 8 to Azure Container Apps

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'  # 自動用最新 patch，穩定

      - name: Restore dependencies
        run: dotnet restore

      - name: Build project
        run: dotnet build --configuration Release --no-restore

      - name: Publish project
        run: dotnet publish --configuration Release --output ./publish --no-restore

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy@v1
        with:
          appName: saas-web-app3
          resourceGroup: saas-infra-group
          source: ./publish                 # Oryx 會從這裡建置成容器映像
          targetPort: 8080                  # .NET 8 容器預設 8080（正確！）
          ingress: external                 # 公開訪問；內部測試可改 internal
          # env:                            # 如果需要加環境變數，可加這裡
          #   - name: ASPNETCORE_ENVIRONMENT
          #     value: Production
# 使用.NET 8 来部署 Azure Container Apps，以确保兼容性和稳定性。
# 原生 .NET 部署 (Oryx)，不使用 DOCKER
# 多行 PEM 密钥在推送至 ACA 时会被强制转换为单行导致损坏，
# 因此在 GitHub Actions 中先转换为 Base64，程序启动时再还原。

name: Deploy .NET 8 to Azure Container Apps

on:
  push:
    branches: [ main ]
  workflow_dispatch:      # 启用手动运行按钮

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: Development          # 确保读取的是 GitHub Environment 中的 secrets

    steps:
      - name: Checkout code
        uses: actions/checkout@v4     # ✅ 修正：是 actions/checkout，不是 azure/checkout

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4 # ✅ 修正：是 actions/setup-dotnet，不是 azure/setup-dotnet
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build project
        run: dotnet build --configuration Release --no-restore

      - name: Publish project
        run: dotnet publish --configuration Release --output ./publish --no-restore

      - name: Login to Azure
        uses: azure/login@v2          # ✅ 这个是对的
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy source code (Oryx build)
        uses: azure/container-apps-deploy@v1 # ✅ 这个也是对的
        with:
          appName: saas-web-app3
          resourceGroup: saas-infra-group
          source: ./publish
          targetPort: 8080
          ingress: external

      - name: Update environment variables
        run: |
          # 1. 转换为单行 Base64 字符串
          B64_PRIVATE=$(printf "%s" "${{ secrets.RSA_PRIVATE_KEY_CONTENT }}" | base64 -w 0)
          B64_PUBLIC=$(printf "%s" "${{ secrets.RSA_PUBLIC_KEY_CONTENT }}" | base64 -w 0)

          # 2. 推送到 Azure Container Apps
          az containerapp update \
            --name saas-web-app3 \
            --resource-group saas-infra-group \
            --set-env-vars \
              "RSA_PRIVATE_KEY_B64=$B64_PRIVATE" \
              "RSA_PUBLIC_KEY_B64=$B64_PUBLIC" \
              "ConnectionStrings__DefaultConnection=${{ secrets.CONNECTIONSTRINGS__DefaultConnection }}" \
              "Stripe__SecretKey=${{ secrets.STRIPE__SECRETKEY }}"
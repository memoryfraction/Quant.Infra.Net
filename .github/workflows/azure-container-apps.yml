# 使用.NET 8 来部署 Azure Container Apps，以确保兼容性和稳定性。
# 原生 .NET 部署 (Oryx)，不使用 DOCKER
# 多行 PEM 密钥在推送至 ACA 时会损坏，因此使用 Base64 传输，程序启动时还原。

name: Deploy .NET 8 to Azure Container Apps
on:
  push:
    branches: [ main ]
  workflow_dispatch:      # 启用手动运行按钮

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: Development          # 确保读取 GitHub Environment Secrets

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies (修复测试项目还原问题)
        run: dotnet restore ./src

      - name: Build project
        run: dotnet build src/Saas.Infra.Net.sln --configuration Release --no-restore

      - name: Publish project
        run: dotnet publish src/Saas.Infra.Net.sln --configuration Release --output ./publish --no-restore

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 关键修复1：部署时直接注入所有环境变量（包括Base64的RSA密钥）
      - name: Deploy source code (Oryx build)
        uses: azure/container-apps-deploy-action@v1
        with:
          appName: saas-web-app3
          resourceGroup: saas-infra-group
          source: ./publish          
          targetPort: 8080
          ingress: external
          # 部署时直接设置环境变量，容器启动时就能读到
          environmentVariables: |
            ASPNETCORE_ENVIRONMENT=Production
            # Base64版密钥（解决多行PEM传输问题）
            RSA_PRIVATE_KEY_B64=${{ secrets.RSA_PRIVATE_KEY_CONTENT | base64encode }}
            RSA_PUBLIC_KEY_B64=${{ secrets.RSA_PUBLIC_KEY_CONTENT | base64encode }}
            # 其他环境变量（双下划线适配.NET配置）
            ConnectionStrings__DefaultConnection=${{ secrets.CONNECTIONSTRINGS__DefaultConnection }}
            Stripe__SecretKey=${{ secrets.STRIPE__SECRETKEY }}

      # 兜底：确保变量生效（可选，部署后再更新一次）
      - name: Ensure environment variables are set
        run: |
          az containerapp update \
            --name saas-web-app3 \
            --resource-group saas-infra-group \
            --set-env-vars \
              "RSA_PRIVATE_KEY_B64=${{ secrets.RSA_PRIVATE_KEY_CONTENT | base64encode }}" \
              "RSA_PUBLIC_KEY_B64=${{ secrets.RSA_PUBLIC_KEY_CONTENT | base64encode }}" \
              "ConnectionStrings__DefaultConnection=${{ secrets.CONNECTIONSTRINGS__DefaultConnection }}" \
              "Stripe__SecretKey=${{ secrets.STRIPE__SECRETKEY }}"
        env:
          # 避免特殊字符被截断
          AZURE_CLI_DISABLE_CONNECTION_VERIFICATION: true
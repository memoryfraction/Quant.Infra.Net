# 使用.NET 8 来部署 Azure Container Apps，以确保兼容性和稳定性。
# 原生 .NET 部署 (Oryx)，不使用 DOCKER
# 变量全部手动配置在ACA中，不再通过GitHub Secrets传递

name: Deploy .NET 8 to Azure Container Apps

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# --- 关键：确保这里没有任何 permissions: id-token: write 的声明 ---

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # 如果你的 Secret 是在仓库全局配置的，建议先临时去掉 environment 这一行来排查
    # environment: Development 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore src/Saas.Infra.Net.sln

      - name: Build project
        run: dotnet build src/Saas.Infra.Net.sln --configuration Release

      - name: Publish project
        run: dotnet publish src/Saas.Infra.Net.sln --configuration Release --output ./publish

      - name: Login to Azure
        uses: azure/login@v1 # 建议降级到 v1 版本，v1 对秘钥登录更友好，不会强制推行 OIDC
        with:
          creds: '{"clientId":"${{ secrets.SAASWEBAPP3_AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.SAASWEBAPP_AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.SAASWEBAPP3_AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.SAASWEBAPP3_AZURE_TENANT_ID }}"}'ction
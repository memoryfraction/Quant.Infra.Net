# 使用.NET 8 来部署 Azure Container Apps，以确保兼容性和稳定性。
# 原生 .NET 部署 (Oryx)，不使用 DOCKER
# 变量全部手动配置在ACA中，不再通过GitHub Secrets传递

name: Deploy .NET 8 to Azure Container Apps
on:
  push:
    branches: [ main ]
  workflow_dispatch:      # 启用手动运行按钮

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: Development          # 仅保留登录Azure所需的ENV，无其他Secret依赖

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies (修复测试项目还原问题)
        run: dotnet restore ./src

      - name: Build project
        run: dotnet build src/Saas.Infra.Net.sln --configuration Release --no-restore

      - name: Publish project
        run: dotnet publish src/Saas.Infra.Net.sln --configuration Release --output ./publish --no-restore

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}  # 仅保留登录Azure的必要Secret

      # 仅部署代码，不传递任何业务变量（变量全部在ACA手动配置）
      - name: Deploy source code (Oryx build)
        uses: azure/container-apps-deploy-action@v1
        with:
          appName: saas-web-app3
          resourceGroup: saas-infra-group
          source: ./publish          
          targetPort: 8080
          ingress: external
          # 只传递固定环境标识，敏感变量全部删除
          environmentVariables: |
            ASPNETCORE_ENVIRONMENT=Production

      # 移除所有变量更新逻辑（无需兜底，ACA已手动配置）
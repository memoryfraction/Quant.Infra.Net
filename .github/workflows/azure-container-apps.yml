# 使用 .NET 8 部署 Azure Container Apps
# 采用服务主权凭证 (Service Principal JSON) 认证
# 原生 .NET 部署 (Oryx)，不使用 Dockerfile

name: Deploy to Azure Container Apps

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 使用在 GitHub Secrets 中配置的 AZURE_CREDENTIALS 登录
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 部署到 Container App
      - name: Build and deploy Container App
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          registryUrl: saaswebreg001-cjd0cucyfdh7bcbk.azurecr.io
          registryUsername: ${{ secrets.REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.REGISTRY_PASSWORD }}
          containerAppName: saas-web-app3
          resourceGroup: saas-infra-group
          targetPort: 8080 
          ingress: external
          # 环境变量映射：左边是程序读取的名字，右边是 Azure Portal 里的 Secret 名字
          environmentVariables: |
            ASPNETCORE_ENVIRONMENT=Production
            RSA_PRIVATE_KEY_CONTENT=secretref:rsa-private-key-content
            RSA_PUBLIC_KEY_CONTENT=secretref:rsa-public-key-content
            ConnectionStrings__DefaultConnection=secretref:connectionstrings-defaultconnection
            Stripe__SecretKey=secretref:stripe-secret-key
            Stripe__WebhookSecret=secretref:stripe-webhook-secret
            Stripe__PublishableKey=secretref:stripe-publishable-key

      # Ensure env vars bound to secrets after Oryx deploy
      - name: Ensure env vars are bound to secrets
        run: |
          az containerapp update \
            --name saas-web-app3 \
            --resource-group saas-infra-group \
            --set-env-vars \
              ASPNETCORE_ENVIRONMENT=Production \
              RSA_PRIVATE_KEY_CONTENT=secretref:rsa-private-key-content \
              RSA_PUBLIC_KEY_CONTENT=secretref:rsa-public-key-content \
              ConnectionStrings__DefaultConnection=secretref:connectionstrings-defaultconnection \
              Stripe__SecretKey=secretref:stripe-secret-key \
              Stripe__WebhookSecret=secretref:stripe-webhook-secret \
              Stripe__PublishableKey=secretref:stripe-publishable-key

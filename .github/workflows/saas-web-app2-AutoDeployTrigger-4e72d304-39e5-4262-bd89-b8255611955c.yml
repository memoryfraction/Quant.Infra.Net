name: Trigger auto deployment for saas-web-app2

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/saas-web-app2-AutoDeployTrigger-4e72d304-39e5-4262-bd89-b8255611955c.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.SAASWEBAPP2_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.SAASWEBAPP2_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.SAASWEBAPP2_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: 
          registryUsername: ${{ secrets.SAASWEBAPP2_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.SAASWEBAPP2_REGISTRY_PASSWORD }}
          containerAppName: saas-web-app2
          resourceGroup: saas-infra-group
          imageToBuild: default/[parameters('containerAppName')]:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


